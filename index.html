<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habit Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#fafaf9;
  --text:#0b0b0b;--text2:#52514e;--muted:#898781;
  --border:rgba(11,11,11,0.12);--bstrong:rgba(11,11,11,0.22);
  --acc:#2a78d6;--acc-bg:#e6f1fb;--acc-text:#185fa5;
  --suc:#1baf7a;--suc-bg:#e1f5ee;--suc-text:#0f6e56;
  --dan:#e34948;--dan-bg:#fcebeb;--dan-text:#a32d2d;
  --r:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141413;--surface:#1e1e1c;--surface2:#242422;
    --text:#f0efe8;--text2:#b0afa6;--muted:#6a6a65;
    --border:rgba(255,255,255,0.1);--bstrong:rgba(255,255,255,0.2);
    --acc:#3987e5;--acc-bg:#0c2a50;--acc-text:#85b7eb;
    --suc:#199e70;--suc-bg:#052f22;--suc-text:#5dcaa5;
    --dan:#e66767;--dan-bg:#3a1010;--dan-text:#f09595;
  }
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
#app{max-width:640px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.sub{color:var(--text2);font-size:14px;margin-bottom:1.25rem}
input,select{background:var(--surface);color:var(--text);border:0.5px solid var(--bstrong);border-radius:var(--r);padding:8px 10px;font-size:14px;width:100%;outline:none;font-family:inherit}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg)}
button{background:transparent;border:0.5px solid var(--bstrong);color:var(--text);border-radius:var(--r);padding:7px 14px;font-size:14px;cursor:pointer;font-family:inherit;transition:background 0.15s}
button:hover{background:var(--surface2)}
.tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.tab{padding:6px 14px;border-radius:99px;border:0.5px solid var(--border);color:var(--text2);font-size:14px;cursor:pointer;background:transparent;font-family:inherit}
.tab.active{background:var(--acc-bg);color:var(--acc-text);border-color:var(--acc);font-weight:500}
.btn-add{margin-left:auto;padding:6px 16px;border-radius:99px;border:0.5px solid var(--acc);background:var(--acc-bg);color:var(--acc-text);font-weight:500;font-size:14px;cursor:pointer;font-family:inherit}
.progress-box{background:var(--surface);border-radius:12px;border:0.5px solid var(--border);padding:1rem 1.25rem;margin-bottom:1rem}
.prog-header{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;color:var(--text2)}
.prog-header span:last-child{font-weight:500;color:var(--text)}
.prog-track{height:8px;border-radius:4px;background:var(--bstrong);overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 0.4s ease}
.prog-label{font-size:12px;color:var(--muted);margin-top:5px}
.card{background:var(--surface);border-radius:12px;border:0.5px solid var(--border);padding:0.875rem 1.1rem;margin-bottom:10px}
.habit-row{display:flex;align-items:center;gap:12px}
.check-btn{width:30px;height:30px;border-radius:50%;flex-shrink:0;border-width:2px;border-style:solid;background:transparent;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#fff;transition:all 0.2s;padding:0}
.habit-name{font-weight:500;font-size:15px}
.habit-name.done{text-decoration:line-through;color:var(--muted)}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;display:inline-block}
.habit-meta{display:flex;gap:10px;margin-top:3px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.habit-time{font-size:11px;color:var(--muted);white-space:nowrap;margin-left:auto}
.week-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.week-grid{display:flex;gap:5px}
.week-day{flex:1;text-align:center}
.week-label{font-size:11px;margin-bottom:4px}
.week-cell{height:32px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)}
.week-cell.done{color:#fff;border-color:transparent}
.manage-row{display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.manage-info{flex:1}
.manage-name{font-weight:500;font-size:15px}
.manage-meta{font-size:12px;color:var(--muted);margin-top:2px}
.btn-remove{border:0.5px solid var(--dan);color:var(--dan-text);border-radius:var(--r);padding:5px 12px;font-size:12px;background:transparent;cursor:pointer;font-family:inherit}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:6px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);padding:1.5rem;width:360px;max-width:100%}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-title{font-size:18px;font-weight:500}
.modal-close{background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:0 4px;line-height:1}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label{font-size:13px;color:var(--text2)}
.btn-row{display:flex;gap:8px;margin-top:4px}
.btn-row button{flex:1}
.btn-primary{background:var(--acc-bg);color:var(--acc-text);border-color:var(--acc);font-weight:500}
.btn-success{background:var(--suc-bg);color:var(--suc-text);border-color:var(--suc);font-weight:500}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:0.5px solid var(--border);border-radius:99px;padding:10px 22px;font-size:14px;font-weight:500;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.15);white-space:nowrap;z-index:200;transition:opacity 0.3s}
.toast.hide{opacity:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CATS=[
  {name:"Health",color:"#1baf7a",bg:"#e1f5ee",dbg:"#052f22"},
  {name:"Learning",color:"#2a78d6",bg:"#e6f1fb",dbg:"#0c2a50"},
  {name:"Mindfulness",color:"#9085e9",bg:"#eeedfe",dbg:"#1a1540"},
  {name:"Work",color:"#eda100",bg:"#faeeda",dbg:"#3a2800"},
  {name:"Fitness",color:"#e34948",bg:"#fcebeb",dbg:"#3a1010"},
  {name:"Other",color:"#888780",bg:"#f1efe8",dbg:"#2a2a28"},
];
const MOTIV=["You crushed it today! 🎉","All habits done — you're on fire!","Perfect day. Keep the momentum!","Consistency is your superpower!","Today = 100%. You're unstoppable! 🔥"];
const catFor=n=>CATS.find(c=>c.name===n)||CATS[5];
const isDark=()=>window.matchMedia("(prefers-color-scheme:dark)").matches;
const today=()=>new Date().toISOString().split("T")[0];
const weekDays=()=>{const d=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split("T")[0]);}return d;};
const el=(tag,attrs={},children=[])=>{const e=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>{if(k==="class")e.className=v;else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});(Array.isArray(children)?children:[children]).forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});return e;};

let habits=[],logs={};
try{const h=localStorage.getItem("ht2_habits");const l=localStorage.getItem("ht2_logs");if(h)habits=JSON.parse(h);if(l)logs=JSON.parse(l);}catch{}
const persist=()=>{try{localStorage.setItem("ht2_habits",JSON.stringify(habits));localStorage.setItem("ht2_logs",JSON.stringify(logs));}catch{}};

let currentView="today";
let toastTimer=null;

function showToast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t);}
  t.textContent=msg;t.classList.remove("hide");
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.add("hide"),3000);
}

function streak(habit){
  let c=0,d=new Date();
  while(true){const k=`${habit.id}_${d.toISOString().split("T")[0]}`;if(!logs[k])break;c++;d.setDate(d.getDate()-1);}
  return c;
}

function openModal(content){
  const overlay=el("div",{class:"overlay"});
  const close=()=>overlay.remove();
  overlay.addEventListener("click",e=>{if(e.target===overlay)close();});
  overlay.appendChild(content(close));
  document.body.appendChild(overlay);
}

function addHabitModal(){
  openModal(close=>{
    const modal=el("div",{class:"modal"});
    const nameI=el("input",{type:"text",placeholder:"e.g. Morning run"});
    const catS=el("select",{},[...CATS.map(c=>el("option",{value:c.name},c.name))]);
    const freqS=el("select",{},[el("option",{value:"daily"},"Daily"),el("option",{value:"weekly"},"Weekly")]);
    const remI=el("input",{type:"time"});
    const doAdd=()=>{
      if(!nameI.value.trim())return;
      habits.push({id:Date.now(),name:nameI.value.trim(),category:catS.value,frequency:freqS.value,reminder:remI.value,createdAt:today()});
      persist();
      if(remI.value&&"Notification" in window)Notification.requestPermission().then(p=>{if(p==="granted")showToast(`Reminder set for ${nameI.value} at ${remI.value}`);});
      close();render();showToast("Habit added!");
    };
    nameI.addEventListener("keydown",e=>{if(e.key==="Enter")doAdd();});
    modal.appendChild(el("div",{class:"modal-header"},[el("span",{class:"modal-title"},"Add a new habit"),el("button",{class:"modal-close",onClick:close},"✕")]));
    [[nameI,"Habit name"],[catS,"Category"],[freqS,"Frequency"],[remI,"Reminder time (optional)"]].forEach(([inp,lbl])=>{modal.appendChild(el("div",{class:"field"},[el("label",{},lbl),inp]));});
    modal.appendChild(el("div",{class:"btn-row"},[el("button",{onClick:close},"Cancel"),el("button",{class:"btn-primary",onClick:doAdd},"Add habit")]));
    return modal;
  });
}

function logModal(habit){
  openModal(close=>{
    const modal=el("div",{class:"modal"});
    const noteI=el("input",{type:"text",placeholder:"e.g. Ran 5km, felt great!"});
    const doLog=()=>{
      const t=today(),key=`${habit.id}_${t}`;
      logs[key]={done:true,note:noteI.value,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
      persist();
      const daily=habits.filter(h=>h.frequency==="daily");
      if(daily.every(h=>logs[`${h.id}_${t}`]))showToast(MOTIV[Math.floor(Math.random()*MOTIV.length)]);
      close();render();
    };
    noteI.addEventListener("keydown",e=>{if(e.key==="Enter")doLog();});
    modal.appendChild(el("div",{class:"modal-header"},[el("span",{class:"modal-title"},`Log: ${habit.name}`),el("button",{class:"modal-close",onClick:close},"✕")]));
    modal.appendChild(el("div",{class:"field"},[el("label",{},"Add a quick note (optional)"),noteI]));
    modal.appendChild(el("div",{class:"btn-row"},[el("button",{onClick:close},"Skip"),el("button",{class:"btn-success",onClick:doLog},"Mark done ✓")]));
    return modal;
  });
}

function renderToday(){
  const t=today();
  return habits.map(habit=>{
    const done=!!logs[`${habit.id}_${t}`];
    const cat=catFor(habit.category);
    const bg=isDark()?cat.dbg:cat.bg;
    const s=streak(habit);
    const chk=el("button",{class:"check-btn",style:{borderColor:done?cat.color:"",backgroundColor:done?cat.color:""},onClick:()=>{
      if(done){delete logs[`${habit.id}_${t}`];persist();render();}else logModal(habit);
    }},done?["✓"]:[]);
    chk.style.borderColor=done?cat.color:"";
    const meta=[];
    if(s>0)meta.push(el("span",{},`🔥 ${s}-day streak`));
    if(habit.reminder)meta.push(el("span",{},`⏰ ${habit.reminder}`));
    if(logs[`${habit.id}_${t}`]?.note)meta.push(el("span",{},`📝 ${logs[`${habit.id}_${t}`].note}`));
    const nameEl=el("span",{class:`habit-name${done?" done":""}`},habit.name);
    const badge=el("span",{class:"badge",style:{background:bg,color:cat.color}},habit.category);
    const timeEl=el("span",{class:"habit-time"},done?(logs[`${habit.id}_${t}`]?.time||""):habit.frequency);
    const row=el("div",{class:"habit-row"},[chk,el("div",{style:{flex:"1"}},[el("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},[nameEl,badge]),el("div",{class:"habit-meta"},meta)]),timeEl]);
    return el("div",{class:"card"},[row]);
  });
}

function renderWeek(){
  const days=weekDays();
  return habits.map(habit=>{
    const cat=catFor(habit.category);
    const bg=isDark()?cat.dbg:cat.bg;
    const wp=days.map(d=>({date:d,done:!!logs[`${habit.id}_${d}`]}));
    const weekDone=wp.filter(x=>x.done).length;
    const s=streak(habit);
    const badge=el("span",{class:"badge",style:{background:bg,color:cat.color}},habit.category);
    const grid=el("div",{class:"week-grid"},wp.map(({date,done})=>{
      const lbl=new Date(date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short"}).slice(0,1);
      const isToday=date===today();
      const cell=el("div",{class:`week-cell${done?" done":""}`},done?"✓":"–");
      if(done)cell.style.background=cat.color;
      const dayEl=el("div",{class:"week-day"},[el("div",{class:"week-label",style:{color:isToday?"var(--acc)":"var(--muted)",fontWeight:isToday?"500":"400"}},lbl),cell]);
      return dayEl;
    }));
    const streakEl=s>0?[el("div",{style:{marginTop:"8px",fontSize:"12px",color:"var(--muted)"}},`🔥 ${s}-day streak`)]:[]; 
    const header=el("div",{class:"week-header"},[el("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},[el("span",{style:{fontWeight:"500",fontSize:"15px"}},habit.name),badge]),el("span",{style:{fontSize:"13px",color:"var(--text2)"}},`${weekDone}/7 days`)]);
    return el("div",{class:"card"},[header,grid,...streakEl]);
  });
}

function renderManage(){
  return habits.map(habit=>{
    const cat=catFor(habit.category);
    const meta=[habit.category,habit.frequency,habit.reminder?`⏰ ${habit.reminder}`:""].filter(Boolean).join(" · ");
    const del=el("button",{class:"btn-remove",onClick:()=>{habits=habits.filter(h=>h.id!==habit.id);persist();render();showToast("Habit removed.");}});
    del.textContent="Remove";
    return el("div",{class:"card"},[el("div",{class:"manage-row"},[el("div",{class:"dot",style:{background:cat.color}}),el("div",{class:"manage-info"},[el("div",{class:"manage-name"},habit.name),el("div",{class:"manage-meta"},meta)]),del])]);
  });
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(el("h1",{},"Habit tracker"));
  app.appendChild(el("p",{class:"sub"},new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"})));

  const daily=habits.filter(h=>h.frequency==="daily");
  const t=today();
  const done=daily.filter(h=>logs[`${h.id}_${t}`]).length;
  const total=daily.length;
  const pct=total>0?Math.round((done/total)*100):0;

  if(total>0){
    const fill=el("div",{class:"prog-fill",style:{width:`${pct}%`,background:pct===100?"var(--suc)":"var(--acc)"}});
    const box=el("div",{class:"progress-box"},[el("div",{class:"prog-header"},[el("span",{},"Today's progress"),el("span",{},`${done}/${total}`)]),el("div",{class:"prog-track"},[fill]),el("div",{class:"prog-label"},`${pct}% complete`)]);
    app.appendChild(box);
  }

  const tabs=["today","week","manage"].map(v=>{
    const b=el("button",{class:`tab${currentView===v?" active":""}`,onClick:()=>{currentView=v;render();}},v.charAt(0).toUpperCase()+v.slice(1));
    return b;
  });
  const addBtn=el("button",{class:"btn-add",onClick:addHabitModal},"+ Add habit");
  app.appendChild(el("div",{class:"tabs"},[...tabs,addBtn]));

  if(habits.length===0){
    app.appendChild(el("div",{class:"empty"},[el("div",{class:"empty-icon"},"🌱"),el("div",{class:"empty-title"},"No habits yet"),el("p",{},"Add your first habit to get started.")]));
    return;
  }

  let cards=[];
  if(currentView==="today")cards=renderToday();
  else if(currentView==="week")cards=renderWeek();
  else cards=renderManage();
  cards.forEach(c=>app.appendChild(c));
}

render();
</script>
</body>
</html>
